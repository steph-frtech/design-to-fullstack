openapi: "3.1.0"
info:
  title: DTFS Generated App API
  version: "0.26.0"
  description: >
    This spec documents the API surface of an application generated by DTFS codegen.
    The actual paths are determined at compile time from the project's BackendContract.
    Paths shown here are representative placeholders using a hypothetical "customers"
    resource. Replace {resource} with your actual resource names.

    The generated backend is a Hono 4 application (apps/api/) consuming the BackendContract
    produced by compileBackendContract(). The frontend (apps/web/) uses hono/client for
    end-to-end type-safe RPC — no client generation is needed for TypeScript consumers.

    For external consumers (mobile, third-party), use this spec to generate a typed client
    with openapi-ts or equivalent.

servers:
  - url: http://localhost:3001
    description: Local generated app API (default Hono port)

tags:
  - name: auth
    description: Better Auth routes — mounted at /api/auth/*
  - name: resources
    description: Generated CRUD resource routes (one family per Resource concept)
  - name: operations
    description: Generated explicit operation routes (one POST per Operation concept)
  - name: assets
    description: Asset upload and retrieval
  - name: system
    description: Healthcheck

paths:

  /api/auth/sign-up/email:
    post:
      operationId: authSignUpEmail
      tags: [auth]
      summary: Register with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                name:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/auth/sign-in/email:
    post:
      operationId: authSignInEmail
      tags: [auth]
      summary: Sign in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/sign-out:
    post:
      operationId: authSignOut
      tags: [auth]
      summary: Invalidate the current session
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean

  /api/auth/session:
    get:
      operationId: authGetSession
      tags: [auth]
      summary: Get the current session
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/{resource}:
    get:
      operationId: listResource
      tags: [resources]
      summary: List records for a generated resource (paginated)
      description: >
        This path is a placeholder. Replace {resource} with your actual resource
        slug (e.g. /api/customers). The exact query parameters depend on the
        Resource.queryConfig in the Control Plane.
      parameters:
        - name: resource
          in: path
          required: true
          schema:
            type: string
          description: Resource slug (e.g. customers, invoices)
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createResource
      tags: [resources]
      summary: Create a record for a generated resource
      parameters:
        - name: resource
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Input schema defined by the Entity's Attributes
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/{resource}/{id}:
    get:
      operationId: getResourceById
      tags: [resources]
      summary: Get a resource record by id
      parameters:
        - name: resource
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateResource
      tags: [resources]
      summary: Partially update a resource record
      parameters:
        - name: resource
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      operationId: deleteResource
      tags: [resources]
      summary: Delete a resource record
      parameters:
        - name: resource
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        "404":
          $ref: "#/components/responses/NotFound"

  /api/operations/{name}:
    post:
      operationId: executeOperation
      tags: [operations]
      summary: Execute a named operation
      description: >
        One POST route per Operation concept defined in the Control Plane.
        Input and output schemas are defined by Operation.inputSchema / outputSchema.
        Replace {name} with the actual operation name (e.g. /api/operations/createInvoice).
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Operation name (camelCase)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Defined by Operation.inputSchema
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Defined by Operation.outputSchema
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/assets:
    post:
      operationId: uploadAsset
      tags: [assets]
      summary: Upload an asset (multipart/form-data)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                entityId:
                  type: string
                attributeName:
                  type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetMeta"

  /api/assets/{id}:
    get:
      operationId: getAssetMeta
      tags: [assets]
      summary: Get asset metadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetMeta"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/assets/{id}/raw:
    get:
      operationId: getAssetRaw
      tags: [assets]
      summary: Get raw asset bytes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Raw bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"

  /health:
    get:
      operationId: healthCheck
      tags: [system]
      summary: Healthcheck
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok, uptime]
                properties:
                  ok:
                    type: boolean
                  uptime:
                    type: number
                    description: Process uptime in seconds

components:

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Forbidden:
      description: Not authorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationApiError"

  schemas:

    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: string

    ValidationApiError:
      type: object
      required: [error, issues]
      properties:
        error:
          type: string
        issues:
          type: array
          items:
            type: object

    AuthSession:
      type: object
      description: Better Auth session response (placeholder — shape depends on AuthMethod config)
      required: [session, user]
      properties:
        session:
          type: object
          required: [id, userId, expiresAt]
          properties:
            id:
              type: string
            userId:
              type: string
            expiresAt:
              type: string
              format: date-time
        user:
          type: object
          required: [id, email, name]
          properties:
            id:
              type: string
            email:
              type: string
              format: email
            name:
              type: string

    ListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            type: object
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    AssetMeta:
      type: object
      required: [id, mimeType, originalName]
      properties:
        id:
          type: string
        mimeType:
          type: string
        originalName:
          type: string
        sizeBytes:
          type: integer
        contentHash:
          type: string
        entityId:
          type: ["string", "null"]
        attributeName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
